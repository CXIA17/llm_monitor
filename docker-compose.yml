version: "3.8"

services:
  llm-monitor:
    build: .
    ports:
      - "8000:8000"   # Launcher (serves court + dashboard as sub-apps)
    volumes:
      # Mount your model directory from the host
      - ${MODEL_DIR:-./models}:/models:ro
      # Persist experiment data across restarts
      - ./court_experiments.pkl:/app/court_experiments.pkl
      - ./dashboard_experiments.pkl:/app/dashboard_experiments.pkl
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Override model and device as needed
    command: ["--model", "Qwen_Qwen3-4B", "--device", "cuda:0"]
